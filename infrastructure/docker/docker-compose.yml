version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cybrion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
    depends_on:
      - api

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/cybrion
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

  admin:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.admin
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
